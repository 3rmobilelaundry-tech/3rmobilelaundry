<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3R Laundry User</title>
  <style>
    /* Essential for React Native Web - Modified for Scroll Fix */
    html, body { height: auto; min-height: 100vh; overflow-y: auto; margin: 0; padding: 0; }
    #root { display: flex; min-height: 100vh; width: 100%; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase Scripts (CDN) - Compat Version -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>
  
  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA6xhtNQOjneQQ4UhAHhiIOxSGTq4GuqIQ",
      authDomain: "r-mobile-laundry.firebaseapp.com",
      projectId: "r-mobile-laundry",
      storageBucket: "r-mobile-laundry.firebasestorage.app",
      messagingSenderId: "399581573326",
      appId: "1:399581573326:web:3668d176c0caa99d09209f"
    };

    try {
        if (typeof firebase !== 'undefined') {
          // Initialize Firebase
          firebase.initializeApp(firebaseConfig);
          const messaging = firebase.messaging();
          
          // Expose messaging to window for the React app
          window.firebaseMessaging = messaging;

          // Push Notification Permission & Token Registration
          async function initializePushNotifications() {
            try {
              if ('Notification' in window) {
                  // Request permission
                  const permission = await Notification.requestPermission();
                  if (permission === "granted") {
                    console.log("Notification permission granted.");
                    
                    // Get Token
                    const token = await messaging.getToken({ 
                      vapidKey: "BGiLli9FQyuwrMnhlTZAYLnU8V2RDVFRRtL39jExoYE5WVIzAy9MbWc1cDoU1VluKo1jywTZjgdp54yrFZf6Eik" 
                    });

                    if (token) {
                      console.log("FCM Token:", token);
                      window.fcmToken = token; // Store globally for React app access
                    }
                  } else {
                    console.log("Notification permission denied.");
                  }
              }
            } catch (error) {
              console.error("Push notification initialization error:", error);
            }
          }

          // Initialize immediately
          initializePushNotifications();

          // Handle foreground messages
          messaging.onMessage(function(payload) {
            console.log("Message received. ", payload);
            const { title, body } = payload.notification || {};
            if (title && 'Notification' in window && Notification.permission === "granted") {
              // Show system notification if allowed (or custom UI)
              // Note: Browsers might block system notifications if tab is focused, 
              // so usually we rely on in-app UI for foreground, but let's try standard API.
              new Notification(title, { 
                body: body, 
                icon: "/logo.png" 
              });
            }
          });
        } else {
          console.error("Firebase SDK not loaded.");
        }
    } catch (e) {
        console.error("Firebase initialization failed:", e);
    }
  </script>
</body>
</html>
