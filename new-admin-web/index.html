<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Head Admin Dashboard</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#F8FAFC;color:#0F172A}
    .container{padding:16px}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
    .btn{background:#0EA5A8;color:#fff;border:none;border-radius:8px;padding:10px 14px;cursor:pointer}
    .row{display:flex;gap:12px;align-items:center}
    .row-between{display:flex;justify-content:space-between;align-items:center}
    input,textarea{padding:10px;border:1px solid #E2E8F0;border-radius:8px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
